global:
  scrape_interval: 15s        # Pull metrics every 15 seconds
  evaluation_interval: 15s    # Evaluate alerting rules every 15 seconds

scrape_configs:
  # ── Flask API ───────────────────────────────────────────────────────────────
  - job_name: "flask_api"
    static_configs:
      - targets: ["api:5000"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  # ── Prometheus self-monitoring ──────────────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
